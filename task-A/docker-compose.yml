services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: secured-chat-room-app:latest
    container_name: secured-chat-room-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongo:
        condition: service_started

  mongo:
    image: mongo:7
    container_name: secured-chat-room-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
